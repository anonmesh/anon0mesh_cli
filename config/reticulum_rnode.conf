# ─────────────────────────────────────────────────────────────────────────────
# anon0mesh — Reticulum config with RNode LoRa interface (Heltec V3)
#
# This config adds an RNodeInterface for the Heltec V3 (ESP32-S3 + SX1262)
# flashed with RNode firmware. It includes all the TCP hubs and local
# interfaces from the standard anon0mesh config.
#
# Usage:
#   cp config/reticulum_rnode.conf ~/.reticulum/config
#   rnsd  # or just start beacon.py / client.py
#
# Serial port:
#   macOS:  /dev/cu.usbserial-0001  (or check: ls /dev/cu.usbserial-*)
#   Linux:  /dev/ttyUSB0            (or check: ls /dev/ttyUSB*)
#
# Before first use, flash the Heltec V3 with RNode firmware:
#   pip install rns
#   rnodeconf --autoinstall
# ─────────────────────────────────────────────────────────────────────────────

[reticulum]
  enable_transport         = True
  share_instance           = Yes
  shared_instance_port     = 37428
  instance_control_port    = 37429
  panic_on_interface_error = No

[interfaces]

# ── LOCAL INTERFACE (LAN auto-discovery) ─────────────────────────────────────
  [[Default Interface]]
    type    = AutoInterface
    enabled = yes

# ── RNODE LORA (Heltec V3 / SX1262) ─────────────────────────────────────────
# Uncomment ONE frequency section below (EU 868 or US 915).
#
# Key parameters:
#   frequency       - Carrier frequency in Hz. Must match your region's ISM band.
#   bandwidth       - LoRa bandwidth in Hz. 125000 is standard. Higher = faster
#                     but shorter range. Options: 7800–500000.
#   spreadingfactor - LoRa SF (7–12). Higher = longer range but slower.
#                     SF7 ≈ 5.5 kbps, SF10 ≈ 0.98 kbps, SF12 ≈ 0.29 kbps.
#   codingrate      - FEC coding rate (5–8 = 4/5–4/8). Higher = more error
#                     correction but slower. 5 is good for most cases.
#   txpower         - Transmit power in dBm. Max varies by region:
#                     EU 868: 14 dBm (25 mW) legal max, SX1262 supports 22.
#                     US 915: 30 dBm (1 W) with antenna gain limits.
#
# Effective data rate at SF7/BW125k/CR5: ~5.5 kbps raw, ~3.5 kbps usable.
# A getBalance response (~120 bytes compressed) takes ~0.3s.
# A getTransaction response (~550 bytes compressed) takes ~1.3s.
# Reticulum MTU is 500 bytes; larger payloads use the Resource API (chunked).

  [[RNode LoRa]]
    type              = RNodeInterface
    interface_enabled = True

    # Serial connection to the Heltec V3
    port              = /dev/cu.usbserial-0001
    speed             = 115200
    databits          = 8
    parity            = none
    stopbits          = 1
    flow_control      = False

    # ── US 915 MHz ────────────────────────────────────────────────────────────
    # Legal in US, Canada, Australia, South America.
    # Max TX power: 30 dBm EIRP (1 W) but check antenna gain.
    frequency         = 915000000
    bandwidth         = 125000
    spreadingfactor   = 7
    codingrate        = 5
    txpower           = 22

    # ── EU 868 MHz (uncomment below, comment out US section above) ───────────
    # Legal in EU, Africa, Middle East, parts of Asia.
    # Max TX power: 14 dBm ERP (25 mW) for most sub-bands.
    # frequency       = 867200000
    # bandwidth       = 125000
    # spreadingfactor = 7
    # codingrate      = 5
    # txpower         = 14

# ── BLUETOOTH BLE ────────────────────────────────────────────────────────────
# Enable if you have BLE support (pip install bleak).
# Useful for phone-to-beacon pairing or short-range mesh.

  [[BLE Interface]]
    type    = BLEInterface
    enabled = no

# ── PUBLIC TCP HUBS (internet backhaul) ──────────────────────────────────────
# These provide connectivity to the wider Reticulum network when internet is
# available. The beacon needs at least one to reach Solana RPC endpoints.
# The LoRa interface handles the off-grid mesh side.

  [[RNS Testnet Dublin]]
    type        = TCPClientInterface
    enabled     = yes
    target_host = dublin.connect.reticulum.network
    target_port = 4965

  [[RNS Testnet BetweenTheBorders]]
    type        = TCPClientInterface
    enabled     = yes
    target_host = reticulum.betweentheborders.com
    target_port = 4242

  [[Beleth RNS Hub]]
    type        = TCPClientInterface
    enabled     = yes
    target_host = rns.beleth.net
    target_port = 4242

  [[g00n.cloud Hub]]
    type        = TCPClientInterface
    enabled     = yes
    target_host = dfw.us.g00n.cloud
    target_port = 6969
